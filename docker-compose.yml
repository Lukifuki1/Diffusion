version: '3.8'

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://auraflow-api:5000
      - WEBUI_NAME=AuraFlow Studio Chat Interface
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - auraflow-api
    restart: unless-stopped

  auraflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auraflow-api
    ports:
      - "5000:5000"
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ChatInterface__Enabled=true
      - ChatInterface__DefaultModel=Flux Dev
      - ChatInterface__MaxConcurrentGenerations=3
      - ChatInterface__TimeoutSeconds=120
      - ChatInterface__ApiBaseUrl=http://auraflow-api:5000
    volumes:
      - models:/app/models
      - output:/app/output
    restart: unless-stopped

volumes:
  openwebui_data:
  models:
  output:

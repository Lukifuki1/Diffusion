<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="auraflow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AuraFlow Logo - Abstract flame/spark design -->
  <g transform="translate(10, 5)">
    <!-- Flame icon -->
    <path d="M20 45 Q30 25 25 15 Q20 5 15 15 Q10 25 20 45 Z" 
          fill="url(#auraflow-gradient)" opacity="0.9"/>
    <path d="M20 40 Q27 30 24 22 Q21 14 18 22 Q15 30 20 40 Z" 
          fill="#F59E0B" opacity="0.8"/>
    
    <!-- Text -->
    <text x="45" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#auraflow-gradient)">
      AuraFlow
    </text>
    <text x="45" y="52" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">
      Studio
    </text>
  </g>
</svg>
